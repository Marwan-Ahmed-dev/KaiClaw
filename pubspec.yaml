name: kaiclaw
description: A Flutter application to control Kaiowa AI assistant via webhooks, with features like chat management, file uploads, and skill management.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.5.1

  # HTTP requests
  http: ^1.2.1

  # For unique IDs
  uuid: ^4.3.3

  # For clean architecture: value equality
  equatable: ^2.0.5

  # For picking files
  file_picker: ^8.0.0

  # For audio recording
  record: ^1.0.0+1
  path_provider: ^2.1.3 # To get temporary directory for audio files
  permission_handler: ^11.3.1 # To handle microphone permission

  # For date formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

# Required for Flutter build for file_picker and record on iOS/Android
# Add these lines for permissions
# android/app/src/main/AndroidManifest.xml
# <uses-permission android:name="android.permission.INTERNET"/>
# <uses-permission android:name="android.permission.RECORD_AUDIO"/>
# <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28"/>
# <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
# <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS"/>

# ios/Runner/Info.plist
# <key>NSMicrophoneUsageDescription</key>
# <string>This app needs access to your microphone to record audio.</string>
